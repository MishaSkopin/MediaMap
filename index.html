<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Медіакарта Полтавщини</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* КАРТА НА ВЕСЬ ЕКРАН */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* КАРКАС ПАНЕЛІ (поверх карти) */
        #sidebar-container {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            display: flex;
            z-index: 2000;
            transition: transform 0.3s ease;
        }

        /* Згортання панелі */
        #sidebar-container.collapsed {
            transform: translateX(-360px);
        }

        #sidebar {
            width: 360px;
            height: 100%;
            background-color: #fcfcfc;
            border-right: 1px solid #ddd;
            box-shadow: 4px 0 12px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        #toggle-btn {
            width: 25px;
            height: 60px;
            background-color: #007bff;
            color: white;
            border: 1px solid #0056b3;
            border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            align-self: center;
            box-shadow: 3px 0 5px rgba(0,0,0,0.2);
            user-select: none;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #007bff;
            color: white;
            margin: 0;
            font-size: 1.3rem;
        }

        /* Стилі для РАЙОНІВ (Рівень 1) */
        .district-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .district-item {
            border-bottom: 2px solid #e0e0e0;
        }

        .district-trigger {
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f1f3f4;
            font-weight: bold;
            color: #202124;
            font-size: 1.1rem;
            border-left: 5px solid #007bff;
        }

        .district-trigger:hover {
            background-color: #e8eaed;
        }

        .district-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: #fff;
        }

        .district-item.active .district-content {
            max-height: 3000px; /* Достатньо велика висота для вмісту */
        }

        /* Стилі для ГРОМАД (Рівень 2) */
        .location-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .location-item {
            border-bottom: 1px solid #eee;
        }

        .location-trigger {
            padding: 12px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
        }

        .location-trigger:hover {
            background-color: #f8f9fa;
        }

        .location-trigger h4 {
            margin: 0;
            color: #444;
            font-size: 1rem;
            font-weight: 600;
        }

        .location-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: #fafafa;
            padding: 0 25px;
            font-size: 13px;
            color: #444;
        }

        /* Активні стани для громад */
        .location-item.active .location-trigger {
            background-color: #e8f0fe;
        }

        .location-item.active .location-trigger h4 {
            color: #1a73e8;
        }

        .location-item.active .location-content {
            max-height: 2000px;
            padding: 15px 25px;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="sidebar-container">
        <div id="sidebar">
            <h2 class="sidebar-header">ЗМІ Полтавщини</h2>
            <ul id="districts-root" class="district-list"></ul>
        </div>
        <div id="toggle-btn">‹</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@mapbox/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>

    <script>
        // 1. Ініціалізація карти
        const map = L.map('map').setView([49.5, 34.0], 8);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 2. Завантаження KML меж
        try {
            omnivore.kml('poltava.kml').addTo(map);
        } catch(e) { console.log(e); }

        // 3. Логіка кнопки згортання панелі
        const sidebarContainer = document.getElementById('sidebar-container');
        const toggleBtn = document.getElementById('toggle-btn');

        toggleBtn.addEventListener('click', () => {
            sidebarContainer.classList.toggle('collapsed');
            toggleBtn.innerText = sidebarContainer.classList.contains('collapsed') ? '›' : '‹';
        });

        // 4. Структуровані дані за районами та громадами
        const districtsData = [
            {
                name: "Полтавський район",
                id: "poltavsky_district",
                locations: [
                    {
                        id: "poltava",
                        coords: [49.589871583757116, 34.55153736319904],
                        title: "Полтава",
                        color: "#E63946",
                        desc: `<b>Телебачення:</b><br>• Суспільне Полтава... (і т.д.)`
                    },
                    {
                        id: "opishnia",
                        coords: [49.959015141844255, 34.603743384410215],
                        title: "Опішня",
                        color: "#F4A261",
                        desc: `<b>Радіо:</b><br>• Селищне радіомовлення «Голос Опішні» Опішня FM`
                    },
                    {
                        id: "lanna",
                        coords: [49.35031203911503, 35.258109326278785],
                        title: "Ланна",
                        color: "#9B5DE5",
                        desc: `<b>Друковані медіа:</b><br>• Газета «Моя громада+»`
                    },
                    {
                        id: "kotelva",
                        coords: [50.06871697970275, 34.76480293991771],
                        title: "Котельва",
                        color: "#F15BB5",
                        desc: `<b>Друковане медіа:</b><br>• Котелевська районна газета «Народна трибуна»`
                    },
                    {
                        id: "reshetylivka",
                        coords: [49.56440548086894, 34.07979173037247],
                        title: "Решетилівка",
                        color: "#00BBF9",
                        desc: `<b>Друковані медіа:</b><br>• Решетилівський вісник`
                    },
                    {
                        id: "rozsoshentsi",
                        coords: [49.5403906136859, 34.504261676751234],
                        title: "Розсошенці",
                        color: "#4D908E",
                        desc: `<b>Друковане медіа:</b><br>• Обласна газета «Полтавська думка»`
                    },
                    {
                        id: "chutove",
                        coords: [49.71139305002166, 35.15749682875592],
                        title: "Чутове",
                        color: "#DDA15E",
                        desc: `<b>Друковані медіа:</b><br>• Газета «Сільські новини»`
                    },
                    {
                        id: "kobeliaky",
                        coords: [49.151277227456056, 34.19500079757286],
                        title: "Кобеляки",
                        color: "#606C38",
                        desc: `<b>Онлайн-медіа:</b><br>• «Тижневик ЕХО»`
                    },
                    {
                        id: "zinkiv",
                        coords: [50.2044126263834, 34.363366514276656],
                        title: "Зіньків",
                        color: "#8338EC",
                        desc: `<b>Радіо:</b><br>• Редакція радіо «Вишня ФМ»`
                    }
                ]
            },
            {
                name: "Лубенський район",
                id: "lubensky_district",
                locations: [
                    {
                        id: "khorol",
                        coords: [49.781980660838684, 33.27406690711789],
                        title: "Хорол",
                        color: "#43AA8B",
                        desc: `<b>Друковані медіа:</b><br>• Вісті Хорольщини`
                    },
                    {
                        id: "pyriatyn",
                        coords: [50.23971543366116, 32.50720593066764],
                        title: "Пирятин",
                        color: "#F9844A",
                        desc: `<b>Друковані media:</b><br>• Газета «Пирятинські вісті»`
                    },
                    {
                        id: "lubny",
                        coords: [50.01647239048797, 33.000682139961796],
                        title: "Лубни",
                        color: "#BC6C25",
                        desc: `<b>Друковані медіа:</b><br>• Вісник`
                    },
                    {
                        id: "hrebinka",
                        coords: [50.1184759876677, 32.45232241478251],
                        title: "Гребінка",
                        color: "#FF006E",
                        desc: `<b>Онлайн-медіа:</b><br>• Гребінка`
                    }
                ]
            },
            {
                name: "Кременчуцький район",
                id: "kremenchutsky_district",
                locations: [
                    {
                        id: "kremenchuk",
                        coords: [49.06925571811738, 33.426795339807455],
                        title: "Кременчук",
                        color: "#1D3557",
                        desc: `<b>Телебачення:</b><br>• Візит<br>• Кременчуцька міська ТРК`
                    },
                    {
                        id: "horishnie_plavni",
                        coords: [49.0156550992913, 33.6408459203986],
                        title: "Горішні Плавні",
                        color: "#2A9D8F",
                        desc: `<b>Телебачення:</b><br>• Телерадіокомпанія ГОК`
                    }
                ]
            },
            {
                name: "Миргородський район",
                id: "myrhorodsky_district",
                locations: [
                    {
                        id: "hadiach",
                        coords: [50.368233749095715, 33.98000552306202],
                        title: "Гадяч",
                        color: "#00F5D4",
                        desc: `<b>Друковані видання:</b><br>• Газета Базар Медіа в Україні`
                    },
                    {
                        id: "myrhorod",
                        coords: [49.96273588416958, 33.607501694968086],
                        title: "Миргород",
                        color: "#F9C74F",
                        desc: `<b>Телебачення:</b><br>• Міська телестудія «Миргород»`
                    },
                    {
                        id: "velyka_bahachka",
                        coords: [49.78925313280651, 33.72845014823058],
                        title: "Велика Багачка",
                        color: "#90BE6D",
                        desc: `<b>Друковані медіа:</b><br>• Газета «Рідний край»`
                    }
                ]
            }
        ];

        const districtsRoot = document.getElementById('districts-root');
        
        // Словники для швидкого пошуку DOM-елементів при кліках на карті
        const districtDOMs = {};
        const locationDOMs = {};

        // Головна функція активації та розгортання потрібного району та громади
        function activateLocation(districtId, locationId) {
            // 1. Перевіряємо та розгортаємо Район (Рівень 1)
            const targetDistrict = districtDOMs[districtId];
            if (targetDistrict) {
                const isDistrictActive = targetDistrict.classList.contains('active');
                if (!isDistrictActive) {
                    // Згортаємо інші райони
                    document.querySelectorAll('.district-item').forEach(el => el.classList.remove('active'));
                    // Розгортаємо наш
                    targetDistrict.classList.add('active');
                }
            }

            // 2. Перевіряємо та розгортаємо Громаду (Рівень 2)
            const targetLocation = locationDOMs[locationId];
            if (targetLocation) {
                const isLocationActive = targetLocation.classList.contains('active');
                // Згортаємо інші громади всередині системи
                document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
                
                if (!isLocationActive) {
                    targetLocation.classList.add('active');
                }
            }

            // Якщо бічна панель закрита, автоматично відкриваємо її
            if (sidebarContainer.classList.contains('collapsed')) {
                toggleBtn.click();
            }
        }

        // Генерація інтерфейсу та маркерів карти
        districtsData.forEach(dist => {
            
            // Створюємо елемент Району
            const districtLi = document.createElement('li');
            districtLi.className = 'district-item';
            districtLi.innerHTML = `
                <div class="district-trigger">
                    <span>${dist.name}</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="district-content">
                    <ul class="location-list"></ul>
                </div>
            `;
            
            districtsRoot.appendChild(districtLi);
            districtDOMs[dist.id] = districtLi; // Зберігаємо посилання

            const locationListUl = districtLi.querySelector('.location-list');

            // Клік по заголовку району (Розгортання/Згортання району)
            districtLi.querySelector('.district-trigger').addEventListener('click', (e) => {
                const isCurrentlyActive = districtLi.classList.contains('active');
                document.querySelectorAll('.district-item').forEach(el => el.classList.remove('active'));
                if (!isCurrentlyActive) {
                    districtLi.classList.add('active');
                }
            });

            // Наповнюємо район громадами
            dist.locations.forEach(loc => {
                
                // 1. Додаємо різнокольорові маркери на карту за допомогою L.circleMarker
                const marker = L.circleMarker(loc.coords, {
                    radius: 10,
                    fillColor: loc.color,
                    color: "#fff",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map);

                // Пов'язуємо клік по маркеру на карті з активацією у списку
                marker.on('click', () => {
                    activateLocation(dist.id, loc.id);
                    // Центруємо карту на маркері для зручності
                    map.setView(loc.coords, map.getZoom());
                });

                // 2. Створюємо елемент Громади (Рівень 2) всередині району
                const locationLi = document.createElement('li');
                locationLi.className = 'location-item';
                locationLi.innerHTML = `
                    <div class="location-trigger">
                        <h4>${loc.title}</h4>
                        <span>+</span>
                    </div>
                    <div class="location-content">${loc.desc}</div>
                `;

                locationListUl.appendChild(locationLi);
                locationDOMs[loc.id] = locationLi; // Зберігаємо посилання

                // Клік по самій громаді в списку
                locationLi.querySelector('.location-trigger').addEventListener('click', (e) => {
                    e.stopPropagation(); // Щоб клік не спрацьовувал на батьківський район
                    const isLocActive = locationLi.classList.contains('active');
                    document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
                    
                    if (!isLocActive) {
                        locationLi.classList.add('active');
                        map.panTo(loc.coords); // Переміщуємо карту до точки
                    }
                });
            });
        });
    </script>
</body>
</html>
