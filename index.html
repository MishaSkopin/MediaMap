<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Медіакарта Полтавщини</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* КАРТА НА ВЕСЬ ЕКРАН */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* КАРКАС ПАНЕЛІ (поверх карти) */
        #sidebar-container {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            display: flex;
            z-index: 2000;
            transition: transform 0.3s ease;
        }

        /* Згортання панелі */
        #sidebar-container.collapsed {
            transform: translateX(-350px);
        }

        #sidebar {
            width: 350px;
            height: 100%;
            background-color: #fcfcfc;
            border-right: 1px solid #ddd;
            box-shadow: 4px 0 12px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        #toggle-btn {
            width: 25px;
            height: 60px;
            background-color: #007bff;
            color: white;
            border: 1px solid #0056b3;
            border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            align-self: center;
            box-shadow: 3px 0 5px rgba(0,0,0,0.2);
            user-select: none;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #007bff;
            color: white;
            margin: 0;
            font-size: 1.3rem;
        }

        .location-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .location-item {
            border-bottom: 1px solid #eee;
        }

        .location-trigger {
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
        }

        .location-trigger h4 {
            margin: 0;
            color: #333;
            font-size: 1.15rem;
        }

        .location-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: #fafafa;
            padding: 0 20px;
            font-size: 13px;
            color: #444;
        }

        .location-item.active .location-trigger {
            background-color: #e8f0fe;
        }

        .location-item.active .location-content {
            max-height: 2000px;
            padding: 15px 20px;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="sidebar-container">
        <div id="sidebar">
            <h2 class="sidebar-header">ЗМІ Полтавщини</h2>
            <ul id="list" class="location-list"></ul>
        </div>
        <div id="toggle-btn">‹</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@mapbox/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>

    <script>
        // 1. Карта
        const map = L.map('map').setView([49.5, 34.0], 8);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 2. KML
        try {
            omnivore.kml('poltava.kml').addTo(map);
        } catch(e) { console.log(e); }

        // 3. Кнопка
        const sidebarContainer = document.getElementById('sidebar-container');
        const toggleBtn = document.getElementById('toggle-btn');

        toggleBtn.addEventListener('click', () => {
            sidebarContainer.classList.toggle('collapsed');
            toggleBtn.innerText = sidebarContainer.classList.contains('collapsed') ? '›' : '‹';
        });

        // 4. Тільки два міста для 100% тесту (якщо запуститься — додамо інші)
        const locations = [
            {
                id: "poltava",
                coords: [49.5898, 34.5515],
                title: "Полтава",
                desc: "<b>Телебачення:</b><br>• Суспільне Полтава<br>• ІРТ-Полтава<br>• PTV UA"
            },
            {
                id: "kremenchuk",
                coords: [49.0692, 33.4267],
                title: "Кременчук",
                desc: "<b>Телебачення:</b><br>• Візит<br>• Кременчуцька міська ТРК"
            }
        ];

        const listContainer = document.getElementById('list');
        const listItemsElements = {};

        function activateCityInSidebar(id) {
            const element = listItemsElements[id];
            if (!element) return;
            const isAlreadyActive = element.classList.contains('active');
            document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
            if (!isAlreadyActive) {
                element.classList.add('active');
                if (sidebarContainer.classList.contains('collapsed')) { toggleBtn.click(); }
            }
        }

        locations.forEach(loc => {
            const marker = L.marker(loc.coords).addTo(map);
            marker.on('click', () => { activateCityInSidebar(loc.id); });

            const listItem = document.createElement('li');
            listItem.className = 'location-item';
            listItem.innerHTML = `
                <div class="location-trigger"><h4>${loc.title}</h4></div>
                <div class="location-content">${loc.desc}</div>
            `;

            listItem.querySelector('.location-trigger').addEventListener('click', () => {
                activateCityInSidebar(loc.id);
            });

            listContainer.appendChild(listItem);
            listItemsElements[loc.id] = listItem;
        });
    </script>
</body>
</html>
