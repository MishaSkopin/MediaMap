    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* КАРТА НА ВЕСЬ ЕКРАН */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* КАРКАС ПАНЕЛІ (поверх карти) */
        #sidebar-container {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            display: flex;
            z-index: 2000;
            transition: transform 0.3s ease;
        }

        /* Згортання панелі */
        #sidebar-container.collapsed {
            transform: translateX(-350px);
        }

        #sidebar {
            width: 350px;
            height: 100%;
            background-color: #fcfcfc;
            border-right: 1px solid #ddd;
            box-shadow: 4px 0 12px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        #toggle-btn {
            width: 25px;
            height: 60px;
            background-color: #007bff;
            color: white;
            border: 1px solid #0056b3;
            border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            align-self: center;
            box-shadow: 3px 0 5px rgba(0,0,0,0.2);
            user-select: none;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #007bff;
            color: white;
            margin: 0;
            font-size: 1.3rem;
        }

        /* Стилі для РАЙОНІВ (Рівень 1) */
        .district-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .district-item {
            border-bottom: 2px solid #e2e8f0;
        }

        .district-trigger {
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8fafc;
            font-weight: bold;
            color: #1e293b;
            font-size: 1.1rem;
            border-left: 4px solid #007bff;
        }

        .district-trigger:hover {
            background-color: #f1f5f9;
        }

        .district-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: #fff;
        }

        .district-item.active .district-content {
            max-height: 4000px; /* Великий запас для контенту */
        }

        /* Стилі для МІСТ/ГРОМАД (Рівень 2) */
        .location-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .location-item {
            border-bottom: 1px solid #eee;
        }

        .location-trigger {
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
        }

        .location-trigger h4 {
            margin: 0;
            color: #333;
            font-size: 1.15rem;
        }

        .location-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: #fafafa;
            padding: 0 20px;
            font-size: 13px;
            color: #444;
        }

        /* Активні стани для міст */
        .location-item.active .location-trigger {
            background-color: #e8f0fe;
        }

        .location-item.active .location-content {
            max-height: 2000px;
            padding: 15px 20px;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>

        // 3. Кнопка згортання панелі
        const sidebarContainer = document.getElementById('sidebar-container');
        const toggleBtn = document.getElementById('toggle-btn');

        toggleBtn.addEventListener('click', () => {
            sidebarContainer.classList.toggle('collapsed');
            toggleBtn.innerText = sidebarContainer.classList.contains('collapsed') ? '›' : '‹';
        });

        // Словники для зв'язку карти та елементів інтерфейсу
        const districtElements = {};
        const locationElements = {};

        // Головна функція активації (для кліку по маркеру чи місту)
        function activateCityInSidebar(districtId, locationId) {
            // 1. Розгортаємо потрібний район, згортаємо інші
            const distEl = districtElements[districtId];
            if (distEl) {
                const isDistActive = distEl.classList.contains('active');
                if (!isDistActive) {
                    document.querySelectorAll('.district-item').forEach(el => el.classList.remove('active'));
                    distEl.classList.add('active');
                }
            }

            // 2. Розгортаємо потрібне місто, згортаємо інші
            const locEl = locationElements[locationId];
            if (locEl) {
                const isLocActive = locEl.classList.contains('active');
                document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
                
                if (!isLocActive) {
                    locEl.classList.add('active');
                    // Якщо панель закрита — відкриваємо її
                    if (sidebarContainer.classList.contains('collapsed')) { toggleBtn.click(); }
                }
            }
        }

        const districtsRoot = document.getElementById('districts-root');

        // Головна функція активації (і для карти, і для списку)
        function activateCityInSidebar(districtId, locationId, cityCoords = null) {
            // 1. Розгортаємо потрібний район, закриваємо інші
            const distEl = districtElements[districtId];
            if (distEl) {
                const isDistActive = distEl.classList.contains('active');
                if (!isDistActive) {
                    document.querySelectorAll('.district-item').forEach(el => el.classList.remove('active'));
                    distEl.classList.add('active');
                }
            }

            // 2. Розгортаємо потрібне місто, закриваємо інші вкладені міста
            const locEl = locationElements[locationId];
            if (locEl) {
                const isLocActive = locEl.classList.contains('active');
                document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
                
                if (!isLocActive) {
                    locEl.classList.add('active');
                    // Автоматично відкриваємо сайдбар, якщо він був згорнутий
                    if (sidebarContainer.classList.contains('collapsed')) { toggleBtn.click(); }
                }
            }

            // 3. Якщо передано координати (клікнули в меню) — центруємо карту на місто
            if (cityCoords) {
                map.setView(cityCoords, 10, { animate: true });
            }
        }

        // Генеруємо дерево елементів
        hierarchyData.forEach(dist => {
            // Створюємо елемент Району (Рівень 1)
            const districtLi = document.createElement('li');
            districtLi.className = 'district-item';
            districtLi.innerHTML = `
                <div class="district-trigger">
                    <span>${dist.name}</span>
                    <span>▼</span>
                </div>
                <div class="district-content">
                    <ul class="location-list"></ul>
                </div>
            `;
            
            districtsRoot.appendChild(districtLi);
            districtElements[dist.id] = districtLi; // Кеш району

            const locationListUl = districtLi.querySelector('.location-list');

            // ВИПРАВЛЕНО: Клік по самому району тепер закриває або відкриває його список
            districtLi.querySelector('.district-trigger').addEventListener('click', (e) => {
                const isCurrentlyActive = districtLi.classList.contains('active');
                document.querySelectorAll('.district-item').forEach(el => el.classList.remove('active'));
                
                if (!isCurrentlyActive) {
                    districtLi.classList.add('active');
                }
            });

            // Наповнюємо район містами (Рівень 2)
            dist.cities.forEach(loc => {
                // Створюємо оригінальний маркер Leaflet на карті
                const marker = L.marker(loc.coords).addTo(map);
                
                // Клік на маркер відкриває меню і підсвічує рядок
                marker.on('click', () => { 
                    activateCityInSidebar(dist.id, loc.id, null); 
                });

                // Створюємо елемент Міста в списку сайдбару
                const listItem = document.createElement('li');
                listItem.className = 'location-item';
                listItem.innerHTML = `
                    <div class="location-trigger"><h4>${loc.title}</h4></div>
                    <div class="location-content">${loc.desc}</div>
                `;

                // Клік по місту в списку центрує карту і відкриває опис
                listItem.querySelector('.location-trigger').addEventListener('click', (e) => {
                    e.stopPropagation(); // щоб не тригерити клік по району
                    activateCityInSidebar(dist.id, loc.id, loc.coords);
                });

                locationListUl.appendChild(listItem);
                locationElements[loc.id] = listItem; // Кеш міста
            });
        });
    </script>
