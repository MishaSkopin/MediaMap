    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* КАРТА НА ВЕСЬ ЕКРАН */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* КАРКАС ПАНЕЛІ (поверх карти) */
        #sidebar-container {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            display: flex;
            z-index: 2000;
            transition: transform 0.3s ease;
        }

        /* Згортання панелі */
        #sidebar-container.collapsed {
            transform: translateX(-350px);
        }

        #sidebar {
            width: 350px;
            height: 100%;
            background-color: #fcfcfc;
            border-right: 1px solid #ddd;
            box-shadow: 4px 0 12px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        #toggle-btn {
            width: 25px;
            height: 60px;
            background-color: #007bff;
            color: white;
            border: 1px solid #0056b3;
            border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            align-self: center;
            box-shadow: 3px 0 5px rgba(0,0,0,0.2);
            user-select: none;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #007bff;
            color: white;
            margin: 0;
            font-size: 1.3rem;
        }

        .location-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .location-item {
            border-bottom: 1px solid #eee;
        }

        .location-trigger {
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
        }

        .location-trigger h4 {
            margin: 0;
            color: #333;
            font-size: 1.15rem;
        }

        .location-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: #fafafa;
            padding: 0 20px;
            font-size: 13px;
            color: #444;
        }

        .location-item.active .location-trigger {
            background-color: #e8f0fe;
        }

        .location-item.active .location-content {
            max-height: 2000px;
            padding: 15px 20px;
            border-top: 1px solid #e2e8f0;
        }
        /* Стиль для кольорових класичних крапель */
.custom-pin-marker {
    background: none !important;
    border: none !important;
}

.marker-pin {
    width: 25px;
    height: 41px;
    background-image: url('https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-icon.png');
    background-size: contain;
    background-repeat: no-repeat;
    position: relative;
}

/* Робимо точне фарбування через маску, щоб кольори з JS збігалися на 100% */
.marker-pin::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 25px;
    height: 41px;
    background-image: url('https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-icon.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-color: var(--marker-color);
    background-blend-mode: multiply;
    -webkit-mask-image: url('https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-icon.png');
    mask-image: url('https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-icon.png');
    -webkit-mask-size: contain;
    mask-size: contain;
    mix-blend-mode: color;
}

        function activateCityInSidebar(id) {
            const element = listItemsElements[id];
            if (!element) return;
            const isAlreadyActive = element.classList.contains('active');
            document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
            if (!isAlreadyActive) {
                element.classList.add('active');
                if (sidebarContainer.classList.contains('collapsed')) { toggleBtn.click(); }
            }

        icon: L.divIcon({
            className: 'custom-pin-marker',
            html: `<div class="marker-pin" style="--marker-color: ${loc.color};"></div>`,
            iconSize: [25, 41],
            iconAnchor: [12, 41]
        })
    }).addTo(map);

    // Виправлено регістр літери "B" у назві функції
    marker.on('click', () => { activateCityInSidebar(loc.id); });

    const listItem = document.createElement('li');
    listItem.className = 'location-item';
    listItem.innerHTML = `

        <div class="location-content">${loc.desc}</div>
