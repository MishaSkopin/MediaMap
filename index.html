    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }
        #sidebar {
            width: 350px;
            background: #ffffff;
            border-right: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        #sidebar-header {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        #sidebar-header h2 {
            margin: 0;
            font-size: 20px;
            color: #333;
        }
        #listContainer {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }
        .location-item {
            border-bottom: 1px solid #eee;
            padding: 10px 15px;
            transition: background 0.2s;
        }
        .location-item:hover {
            background: #f1f3f5;
        }
        .location-trigger {
            cursor: pointer;
        }
        .location-trigger h4 {
            margin: 0 0 5px 0;
            color: #007bff;
            font-size: 16px;
        }
        
        /* СТИЛІ ДЛЯ ГАРМОШКИ (Приховуємо вміст за замовчуванням) */
        .location-content {
            display: none;
            font-size: 13px;
            color: #555;
            line-height: 1.4;
            padding-top: 5px;
        }
        
        /* Клас, який відкриває гармошку для активного міста */
        .location-item.active .location-content {
            display: block;
        }
        
        .location-content a {
            color: #007bff;
            text-decoration: none;
        }
        .location-content a:hover {
            text-decoration: underline;
        }
        #map {
            flex-grow: 1;
            height: 100%;
        }

        /* Стиль для кастомних SVG-крапель */
        .custom-pin-marker {
            background: none !important;
            border: none !important;
        }
    </style>
</head>
