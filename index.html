<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Медіакарта Полтавщини</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* КАРТА НА ВЕСЬ ЕКРАН */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ПЛАВАЮЧИЙ КОНТЕЙНЕР ЛЕГЕНДИ ПОВЕРХ КАРТИ */
        #sidebar-container {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            display: flex;
            z-index: 2000; /* Панель точно поверх карти */
            transition: transform 0.3s ease;
        }

        /* Стан, коли панель згорнута — повністю ховаємо її тіло */
        #sidebar-container.collapsed {
            transform: translateX(-350px);
        }

        /* Тіло лівої панелі */
        #sidebar {
            width: 350px;
            height: 100%;
            background-color: #fcfcfc;
            border-right: 1px solid #ddd;
            box-shadow: 4px 0 12px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Кнопка згортання/розгортання */
        #toggle-btn {
            width: 25px;
            height: 60px;
            background-color: #007bff;
            color: white;
            border: 1px solid #0056b3;
            border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            align-self: center;
            box-shadow: 3px 0 5px rgba(0,0,0,0.2);
            user-select: none;
        }

        #toggle-btn:hover {
            background-color: #0056b3;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #007bff;
            color: white;
            margin: 0;
            font-size: 1.3rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .location-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .location-item {
            border-bottom: 1px solid #eee;
        }

        .location-trigger {
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            transition: background 0.2s;
        }

        .location-trigger:hover {
            background-color: #f8f9fa;
        }

        .location-trigger h4 {
            margin: 0;
            color: #333;
            font-size: 1.15rem;
            font-weight: bold;
        }

        .location-arrow {
            font-size: 14px;
            color: #aaa;
            transition: transform 0.3s ease;
        }

        .location-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease;
            background-color: #fafafa;
            padding: 0 20px;
            font-size: 13px;
            color: #444;
            line-height: 1.6;
        }

        /* Стилі для розгорнутого міста */
        .location-item.active .location-trigger {
            background-color: #e8f0fe;
        }
        
        .location-item.active .location-trigger h4 {
            color: #007bff;
        }

        .location-item.active .location-arrow {
            transform: rotate(90deg);
            color: #007bff;
        }

        .location-item.active .location-content {
            max-height: 2500px;
            padding: 15px 20px 20px 20px;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
