<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Медіакарта Полтавщини</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            display: flex;
            overflow: hidden;
        }

        /* Контейнер для панелі та кнопки */
        #sidebar-container {
            display: flex;
            height: 100%;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        /* Стан, коли панель згорнута */
        #sidebar-container.collapsed {
            transform: translateX(-350px);
        }

        /* Ліва бічна панель (Легенда) */
        #sidebar {
            width: 350px;
            height: 100%;
            background-color: #fcfcfc;
            border-right: 1px solid #ddd;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Кнопка згортання/розгортання */
        #toggle-btn {
            width: 25px;
            height: 60px;
            background-color: #007bff;
            color: white;
            border: 1px solid #0056b3;
            border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            align-self: center;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            user-select: none;
        }

        #toggle-btn:hover {
            background-color: #0056b3;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #007bff;
            color: white;
            margin: 0;
            font-size: 1.4rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .location-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        /* Елемент списку (місто) */
        .location-item {
            border-bottom: 1px solid #eee;
            transition: background 0.3s ease;
        }

        /* Шапка міста (назва, на яку тицяємо) */
        .location-trigger {
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            transition: background 0.2s;
        }

        .location-trigger:hover {
            background-color: #f8f9fa;
        }

        .location-trigger h4 {
            margin: 0;
            color: #333;
            font-size: 1.2rem;
            font-weight: bold;
            transition: color 0.2s;
        }

        /* Стрілочка розгортання */
        .location-arrow {
            font-size: 14px;
            color: #aaa;
            transition: transform 0.3s ease;
        }

        /* Контент з інформацією (схований за замовчуванням) */
        .location-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease;
            background-color: #fafafa;
            padding: 0 20px;
            font-size: 13px;
            color: #444;
            line-height: 1.6;
        }

        /* СТИЛІ ДЛЯ АКТИВНОГО (РОЗГОРНУТОГО) МІСТА */
        .location-item.active .location-trigger {
            background-color: #e8f0fe;
        }
        
        .location-item.active .location-trigger h4 {
            color: #007bff;
        }

        .location-item.active .location-arrow {
            transform: rotate(90px); /* Повертаємо стрілочку вниз */
            color: #007bff;
        }

        .location-item.active .location-content {
            max-height: 2000px; /* Достатня висота для великого тексту */
            padding: 15px 20px 20px 20px;
            border-top: 1px solid #e2e8f0;
        }

        /* Карта */
        #map {
            flex-grow: 1;
            height: 100%;
            margin-left: 0;
            transition: margin-left 0.3s ease;
        }
        
        #sidebar-container.collapsed + #map {
            margin-left: -25px;
        }
    </style>
</head>
<body>

    <div id="sidebar-container">
        <div id="sidebar">
            <h2 class="sidebar-header">ЗМІ та Медіа Полтавщини</h2>
            <ul id="list" class="location-list">
                </ul>
        </div>
        <div id="toggle-btn">‹</div>
    </div>

    <div id="map"></div>
