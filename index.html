    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* КАРТА НА ВЕСЬ ЕКРАН */
        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* КАРКАС ПАНЕЛІ (поверх карти) */
        #sidebar-container {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            display: flex;
            z-index: 2000;
            transition: transform 0.3s ease;
        }

        /* Згортання панелі */
        #sidebar-container.collapsed {
            transform: translateX(-350px);
        }

        #sidebar {
            width: 350px;
            height: 100%;
            background-color: #fcfcfc;
            border-right: 1px solid #ddd;
            box-shadow: 4px 0 12px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }

        #toggle-btn {
            width: 25px;
            height: 60px;
            background-color: #007bff;
            color: white;
            border: 1px solid #0056b3;
            border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            align-self: center;
            box-shadow: 3px 0 5px rgba(0,0,0,0.2);
            user-select: none;
        }

        .sidebar-header {
            padding: 20px 20px 10px 20px;
            background-color: #007bff;
            color: white;
            margin: 0;
            font-size: 1.3rem;
        }

        /* БЛОК ПОШУКУ ТА ФІЛЬТРІВ */
        .search-filter-box {
            background-color: #007bff;
            padding: 0 20px 15px 20px;
            color: white;
            border-bottom: 1px solid #0056b3;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 4px;
            border: none;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 12px;
            outline: none;
        }

        .section-subtitle {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            opacity: 0.8;
            font-weight: bold;
        }

        .filters-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .filter-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        /* Сортування */
        .sort-container {
            font-size: 13px;
        }
        .sort-select {
            width: 100%;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #0056b3;
            background-color: #fff;
            color: #333;
            outline: none;
            cursor: pointer;
        }

        .sidebar-scroll-area {
            flex: 1;
            overflow-y: auto;
        }

        /* Стилі для РАЙОНІВ */
        .district-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .district-item {
            border-bottom: 2px solid #e2e8f0;
            display: block;
        }

        .district-trigger {
            padding: 16px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8fafc;
            font-weight: bold;
            color: #1e293b;
            font-size: 1.1rem;
            border-left: 4px solid #007bff;
        }

        .district-trigger:hover {
            background-color: #f1f5f9;
        }

        .district-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: #fff;
        }

        .district-item.active .district-content {
            max-height: 5000px; 
        }

        /* Стилі для МІСТ */
        .location-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .location-item {
            border-bottom: 1px solid #eee;
            display: block;
        }

        .location-trigger {
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
        }

        .location-trigger h4 {
            margin: 0;
            color: #333;
            font-size: 1.15rem;
        }

        .location-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background-color: #fafafa;
            padding: 0 20px;
            font-size: 13px;
            color: #444;
            line-height: 1.4;
        }

        .location-item.active .location-trigger {
            background-color: #e8f0fe;
        }

        .location-item.active .location-content {
            max-height: 3000px;
            padding: 15px 20px;
            border-top: 1px solid #e2e8f0;
            overflow-y: auto;
        }

            background-color: #ffeb3b;
            color: #000;
            padding: 0 2px;
            border-radius: 2px;
        }
    </style>

        // Кнопка згортання та свайп
        const sidebarContainer = document.getElementById('sidebar-container');
        const toggleBtn = document.getElementById('toggle-btn');

        function toggleSidebar(forceCollapse) {
            if (typeof forceCollapse === 'boolean') {
                if (forceCollapse) sidebarContainer.classList.add('collapsed');
                else sidebarContainer.classList.remove('collapsed');
            } else {
                sidebarContainer.classList.toggle('collapsed');
            }
            toggleBtn.innerText = sidebarContainer.classList.contains('collapsed') ? '›' : '‹';
        }

        toggleBtn.addEventListener('click', toggleSidebar);

        let touchStartX = 0;
        let touchEndX = 0;
        sidebarContainer.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        sidebarContainer.addEventListener('touchend', (e) => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, { passive: true });

        function handleSwipe() {
            const swipeDistance = touchEndX - touchStartX;
            if (swipeDistance < -50) toggleSidebar(true);
            if (swipeDistance > 50) toggleSidebar(false);
        }

        const districtElements = {};
        const locationElements = {};
        const districtsRoot = document.getElementById('districts-root');

        // Функція підсвічування тексту збігу
        function highlightText(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${query.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        // Функція підрахунку кількості увімкнених медіа для конкретного міста
        function countActiveMedia(city) {
            let count = 0;
            if (state.filters.tv && city.media.tv) count += city.media.tv.length;
            if (state.filters.radio && city.media.radio) count += city.media.radio.length;
            if (state.filters.print && city.media.print) count += city.media.print.length;
            if (state.filters.online && city.media.online) count += city.media.online.length;
            if (state.filters.social && city.media.social) count += city.media.social.length;
            return count;
        }

        // Перевіряє чи є в місті потрібний текст під активними фільтрами
        function getFilteredContentAndCheckSearch(city, query) {
            let html = "";
            let hasData = false;
            let queryFound = false;

            // Перевірка назви міста
            if (query && city.title.toLowerCase().includes(query.toLowerCase())) {
                queryFound = true;
            }

            // Допоміжна внутрішня функція обробки медіа блоків
            function processGroup(items, title) {
                let groupHtml = "";
                let groupHasValidItem = false;
                
                items.forEach(item => {
                    const textContent = item.text || `${item.name} ${item.info} ${item.link}`;
                    const matchesSearch = !query || textContent.toLowerCase().includes(query.toLowerCase());
                    
                    if (matchesSearch) {
                        if (query) queryFound = true;
                        
                        if (item.text) {
                            groupHtml += `• ${highlightText(item.text, query)}<br>`;
                        } else {
                            groupHtml += `• <a href="${item.link}" target="_blank">${highlightText(item.name, query)}</a> (${highlightText(item.info, query)})<br>`;
                        }
                        groupHasValidItem = true;
                    }
                });

                if (groupHasValidItem) {
                    html += `<div class="media-group-title"><b>${title}:</b></div>` + groupHtml;
                    hasData = true;
                }
            }

            if (state.filters.tv && city.media.tv) processGroup(city.media.tv, "Телебачення");
            if (state.filters.radio && city.media.radio) processGroup(city.media.radio, "Радіо");
            if (state.filters.print && city.media.print) processGroup(city.media.print, "Друковані медіа");
            if (state.filters.online && city.media.online) processGroup(city.media.online, "Онлайн-медіа");
            if (state.filters.social && city.media.social) processGroup(city.media.social, "Соціальні мережі");

            // Якщо є запит, але нічого не знайдено ні в назві міста, ні всередині тексту, повертаємо null
            if (query && !queryFound) return null;

            return hasData ? html : null;
        }

        function activateCityInSidebar(districtId, locationId, cityCoords = null) {
            const distEl = districtElements[districtId];
            if (distEl && !distEl.classList.contains('active')) {
                document.querySelectorAll('.district-item').forEach(el => el.classList.remove('active'));
                distEl.classList.add('active');
            }

            const locEl = locationElements[locationId];
            if (locEl) {
                const isLocActive = locEl.classList.contains('active');
                document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
                
                if (!isLocActive) {
                    locEl.classList.add('active');
                    if (sidebarContainer.classList.contains('collapsed')) { toggleSidebar(false); }
                }
                locEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            if (cityCoords) {
                map.setView(cityCoords, 10, { animate: true });
            }
        }

        // РЕНДЕРИНГ МАРКЕРІВ ТА СПИСКУ З СОРТУВАННЯМ
        function renderDashboard() {
            markersGroup.clearLayers();
            districtsRoot.innerHTML = "";

            hierarchyData.forEach(dist => {
                const query = state.searchQuery;

                // 1. Формуємо список міст згенерованим контентом, які проходять фільтр пошуку
                let processedCities = dist.cities.map(city => {
                    const contentHtml = getFilteredContentAndCheckSearch(city, query);
                    return {
                        ...city,
                        html: contentHtml,
                        mediaCount: countActiveMedia(city)
                    };
                }).filter(city => city.html !== null);

                if (processedCities.length === 0) return;

                // 2. СОРТУВАННЯ МІСТ всередині району
                if (state.sortBy === "alphabet") {
                    processedCities.sort((a, b) => a.title.localeCompare(b.title, 'uk'));
                } else if (state.sortBy === "media-count") {
                    processedCities.sort((a, b) => b.mediaCount - a.mediaCount);
                }

                // Створюємо елемент Району
                const districtLi = document.createElement('li');
                districtLi.className = 'district-item';
                districtLi.innerHTML = `
                    <div class="district-trigger">
                        <span>${dist.name}</span>
                        <span>▼</span>
                    </div>
                    <div class="district-content">
                        <ul class="location-list"></ul>
                    </div>
                `;
                
                districtsRoot.appendChild(districtLi);
                districtElements[dist.id] = districtLi;

                districtLi.querySelector('.district-trigger').addEventListener('click', () => {
                    const isCurrentlyActive = districtLi.classList.contains('active');
                    document.querySelectorAll('.district-item').forEach(el => el.classList.remove('active'));
                    if (!isCurrentlyActive) districtLi.classList.add('active');
                });

                const locationListUl = districtLi.querySelector('.location-list');

                // Рендеримо вже відсортовані та відфільтровані міста
                processedCities.forEach(loc => {
                    const marker = L.marker(loc.coords);
                    markersGroup.addLayer(marker);
                    
                    marker.on('click', () => { 
                        activateCityInSidebar(dist.id, loc.id, null); 
                    });

                    const listItem = document.createElement('li');
                    listItem.className = 'location-item';
                    
                    // Відображаємо кількість активних медіа поруч із назвою, якщо увімкнено сортування за кількістю
                    const badge = state.sortBy === 'media-count' ? ` <small style="color:#777; font-weight:normal;">(${loc.mediaCount})</small>` : '';
                    
                    listItem.innerHTML = `
                        <div class="location-trigger"><h4>${highlightText(loc.title, query)}${badge}</h4></div>
                        <div class="location-content">${loc.html}</div>
                    `;

                    listItem.querySelector('.location-trigger').addEventListener('click', (e) => {
                        e.stopPropagation();
                        activateCityInSidebar(dist.id, loc.id, loc.coords);
                    });

                    locationListUl.appendChild(listItem);
                    locationElements[loc.id] = listItem;
                });

                // Якщо введено пошуковий запит, автоматично розгортаємо райони з результатами
                if (query.length > 0) {
                    districtLi.classList.add('active');
                }
            });
        }

        // СЛУХАЧІ ПОДІЙ
        document.getElementById('search-box').addEventListener('input', (e) => {
            state.searchQuery = e.target.value.trim();
            renderDashboard();
        });

        document.getElementById('sort-select').addEventListener('change', (e) => {
            state.sortBy = e.target.value;
            renderDashboard();
        });

        const filterIds = {
            tv: 'filter-tv',
            radio: 'filter-radio',
            print: 'filter-print',
            online: 'filter-online',
            social: 'filter-social'
        };

        Object.keys(filterIds).forEach(key => {
            document.getElementById(filterIds[key]).addEventListener('change', (e) => {
                state.filters[key] = e.target.checked;
                renderDashboard();
            });
        });

        renderDashboard();
    </script>
