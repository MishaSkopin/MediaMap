    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Налаштування всього екрану */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            display: flex; /* Розміщуємо панель і карту в один ряд */
        }

        /* Ліва бічна панель */
        #sidebar {
            width: 300px;
            height: 100%;
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 1000; /* Панель поверх карти на мобільних */
            overflow-y: auto; /* Якщо точок багато, з'явиться прокрутка */
        }

        /* Заголовок в панелі */
        .sidebar-header {
            padding: 20px;
            background-color: #1565c0;
            color: white;
            margin: 0;
        }

        /* Список точок */
        .location-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        /* Елемент списку (місто) */
        .location-item {
            padding: 15px 20px;
            border-bottom: 1px solid #e9ecef;
            cursor: pointer;
            transition: background 0.2s;
        }

        .location-item:hover {
            background-color: #e3f2fd;
        }

        .location-item h4 {
            margin: 0 0 5px 0;
            color: #1e88e5;
        }

        .location-item p {
            margin: 0;
            font-size: 13px;
            color: #6c757d;
        }

        /* Карта займає весь простір, що залишився */
        #map {
            flex-grow: 1;
            height: 100%;
        }
    </style>
</head>

        locations.forEach(loc => {

            const popupContent = `
                <div style="font-family: Arial, sans-serif; min-width: 150px;">
                    <h3 style="margin: 0 0 5px 0; color: #1565c0;">${loc.title}</h3>
                    <p style="margin: 0; font-size: 14px; color: #333;">${loc.desc}</p>
                </div>
            `;
            marker.bindPopup(popupContent);

            // Створюємо елемент списку для лівої панелі
            const listItem = document.createElement('li');
            listItem.className = 'location-item';
            listItem.innerHTML = `
                <h4>${loc.title}</h4>
                <p>${loc.desc.substring(0, 60)}...</p> 
            `;

            listItem.addEventListener('click', () => {
                // 1. Наближаємо карту до точки (координати, масштаб 11)
                map.setView(loc.coords, 11, { animate: true, duration: 1 });
                // 2. Відкриваємо попап цього маркера
                marker.openPopup();
            });

            // Додаємо створений елемент у меню
            listContainer.appendChild(listItem);
