    <!-- Стилі для карти Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
            display: flex;
            overflow: hidden;
        }

        /* Контейнер для панелі та кнопки */
        #sidebar-container {
            display: flex;
            height: 100%;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        /* Стан, коли панель згорнута */
        #sidebar-container.collapsed {
            transform: translateX(-350px); /* Ховаємо панель ліворуч */
        }

        /* Ліва бічна панель (Легенда) */
        #sidebar {
            width: 350px;
            height: 100%;
            background-color: #fcfcfc;
            border-right: 1px solid #ddd;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Кнопка згортання/розгортання */
        #toggle-btn {
            width: 25px;
            height: 60px;
            background-color: #007bff;
            color: white;
            border: 1px solid #0056b3;
            border-left: none;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            align-self: center; /* Центруємо вертикально */
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            user-select: none;
        }

        #toggle-btn:hover {
            background-color: #0056b3;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #007bff;
            color: white;
            margin: 0;
            font-size: 1.4rem;
            position: sticky;
            top: 0;
        }

        .location-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        /* Елемент списку (місто) */
        .location-item {
            padding: 20px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.3s ease, border-left 0.2s ease;
            border-left: 4px solid transparent;
        }

        .location-item:hover {
            background-color: #f1f3f5;
        }

        /* Стиль для підсвітки активного міста */
        .location-item.active {
            background-color: #e8f0fe;
            border-left: 4px solid #007bff;
        }

        .location-item h4 {
            margin: 0 0 10px 0;
            color: #007bff;
            font-size: 1.25rem;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 5px;
        }

        .location-item div {
            font-size: 13px;
            color: #333;
            line-height: 1.5;
        }

        /* Карта займає залишок місця */
        #map {
            flex-grow: 1;
            height: 100%;
            margin-left: 0;
            transition: margin-left 0.3s ease;
        }
        
        /* Зсув карти назад, коли ховаємо панель */
        #sidebar-container.collapsed + #map {
            margin-left: -25px; /* компенсуємо ширину кнопки */
        }
    </style>

        // 5. Функція активації конкретного міста в легенді
        function activateCityInSidebar(id) {
            // Забираємо підсвітку у попереднього активного міста
            document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
            
            const element = listItemsElements[id];
            if (element) {
                element.classList.add('active'); // Підсвічуємо поточне
                
                // Якщо панель згорнута — розгортаємо її
                if (sidebarContainer.classList.contains('collapsed')) {
                    toggleBtn.click();
                }
                
                // Плавно скролимо панель саме до цього міста
                element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // 6. Створення маркерів та легенди
        locations.forEach(loc => {
            // Маркери тепер БЕЗ постійних спливаючих вікон (попапів)
            const marker = L.marker(loc.coords).addTo(map);
            
            // При кліку на МАРКЕР — підсвічуємо легенду зліва
            marker.on('click', () => {
                map.setView(loc.coords, 10, { animate: true, duration: 0.8 });
                activateCityInSidebar(loc.id);
            });

            // Створюємо блок міста в легенді
            const listItem = document.createElement('li');
            listItem.className = 'location-item';
            listItem.id = 'item-' + loc.id;
            listItem.innerHTML = `
                <h4>${loc.title}</h4>
                <div>${loc.desc}</div>
            `;

            // При кліку на МІСТО В ЛЕГЕНДІ — центруємо на нього карту
            listItem.addEventListener('click', () => {
                map.setView(loc.coords, 11, { animate: true, duration: 1 });
                activateCityInSidebar(loc.id);
            });

            listContainer.appendChild(listItem);
            listItemsElements[loc.id] = listItem; // Зберігаємо посилання
        });
